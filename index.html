<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,500;8..60,600;8..60,700&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  :root{
    --red:#D50032; --red-deep:#A8002A;
    --ink:#53565A; --ink-strong:#3A3D42;
    --line:#C8C9C7; --line-soft:#E2E3E2;
    --surface:#FFFFFF;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    font-family:"Source Sans 3",system-ui,sans-serif;color:var(--ink);
    background:radial-gradient(120% 80% at 50% -10%, #F4F5F5 0%, #E7E8E8 60%, #D5D6D6 100%);
    min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:24px 16px;
  }
  .card{
    width:100%;max-width:380px;background:var(--surface);
    border:1px solid var(--line);border-radius:6px;
    box-shadow:0 1px 0 rgba(0,0,0,.03), 0 20px 48px -28px rgba(0,0,0,.4);
    position:relative;padding:30px 28px 26px;text-align:center;
  }
  .lang{
    position:absolute;top:16px;right:16px;display:flex;
    border:1px solid var(--line);border-radius:999px;overflow:hidden;
    font-size:11px;background:#fff;
  }
  .lang button{
    border:0;background:transparent;color:var(--ink);
    padding:5px 11px;cursor:pointer;font:inherit;font-weight:600;letter-spacing:.04em;
    transition:background .15s ease,color .15s ease;
  }
  .lang button.active{background:var(--red);color:#fff;}

  .logo{width:84px;height:84px;object-fit:contain;margin:6px auto 16px;display:block;}

  .eyebrow{
    font-size:10.5px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;
    color:var(--red);margin-bottom:14px;
  }
  .name{
    font-family:"Source Serif 4",Georgia,serif;font-weight:600;font-size:28px;
    line-height:1.1;letter-spacing:-.01em;color:var(--ink-strong);margin-bottom:5px;
  }
  .title{
    font-family:"Source Serif 4",Georgia,serif;font-weight:500;font-size:15px;
    font-style:italic;color:var(--ink);margin-bottom:22px;
  }
  .strip{
    border-top:1px solid var(--line);border-bottom:1px solid var(--line);
    padding:14px 2px;margin-bottom:24px;display:grid;gap:9px;text-align:left;
  }
  .strip div{font-size:12.5px;line-height:1.35;color:var(--ink-strong);display:flex;gap:12px;}
  .strip span{
    color:var(--red);min-width:46px;flex-shrink:0;font-weight:600;
    font-size:10.5px;letter-spacing:.08em;padding-top:1px;
  }
  .btn{
    display:flex;align-items:center;justify-content:center;gap:9px;width:100%;
    border:1px solid var(--red);background:var(--red);color:#fff;
    font-family:"Source Sans 3",sans-serif;font-size:15px;font-weight:600;
    padding:13px;border-radius:4px;cursor:pointer;text-decoration:none;
    transition:transform .12s ease, background .15s ease, border-color .15s ease;
  }
  .btn:hover{transform:translateY(-1px);background:var(--red-deep);border-color:var(--red-deep);}
  .btn:active{transform:translateY(0);}

  .row{display:grid;gap:8px;margin-top:9px;}
  .mini{
    display:flex;align-items:center;justify-content:center;
    border:1px solid var(--line);border-radius:4px;background:#fff;color:var(--ink-strong);
    padding:11px 6px;font-size:12.5px;font-weight:600;text-decoration:none;cursor:pointer;
    transition:border-color .15s ease, color .15s ease;
  }
  .mini:hover{border-color:var(--red);color:var(--red);}

  .qrwrap{margin-top:18px;display:none;border-top:1px dashed var(--line);padding-top:18px;}
  .qrwrap.open{display:block;animation:fade .25s ease;}
  #qr{display:inline-block;padding:10px;background:#fff;border:1px solid var(--line);border-radius:4px;}
  #qr img,#qr canvas{display:block;}
  .qrnote{font-size:10.5px;color:var(--ink);margin-top:10px;letter-spacing:.04em;}

  .foot{
    margin-top:20px;font-size:10px;font-weight:600;letter-spacing:.16em;
    text-transform:uppercase;color:var(--line);
  }
  @keyframes fade{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:none;}}
  @media (prefers-reduced-motion:reduce){.btn:hover{transform:none;}}
</style>
</head>
<body>
  <main class="card">
    <div class="lang">
      <button id="btnTr" class="active" onclick="setLang('tr')">TR</button>
      <button id="btnEn" onclick="setLang('en')">EN</button>
    </div>

    <img class="logo" id="logo" alt="T.C. Ticaret Bakanlığı" />
    <div class="eyebrow" id="eyebrow"></div>
    <h1 class="name" id="ad"></h1>
    <p class="title" id="unvan"></p>

    <div class="strip">
      <div><span id="lk"></span><b id="kurum"></b></div>
      <div><span id="lb"></span><b id="birim"></b></div>
      <div><span id="ls"></span><b id="sehir"></b></div>
    </div>

    <button class="btn" id="vcardBtn">&#8595;&nbsp; <span id="addLbl"></span></button>
    <div class="row" id="actions"></div>
    <button class="mini" id="qrBtn" style="margin-top:9px;"></button>

    <div class="qrwrap" id="qrwrap">
      <div id="qr"></div>
      <div class="qrnote" id="qrNote"></div>
    </div>

    <div class="foot" id="foot"></div>
  </main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
  const $ = id => document.getElementById(id);
  let lang="tr", qrOpen=false, qrDone=false;

  function render(){
    const d=KART[lang], u=UI[lang];
    document.documentElement.lang=lang;
    $("logo").src=LOGO[lang];
    $("eyebrow").textContent=u.eyebrow;
    $("ad").textContent=d.ad;
    $("unvan").textContent=d.unvan;
    $("lk").textContent=u.LK; $("kurum").textContent=d.kurum;
    $("lb").textContent=u.LB; $("birim").textContent=d.birim;
    $("ls").textContent=u.LS; $("sehir").textContent=d.sehir;
    $("addLbl").textContent=u.add;
    $("foot").textContent=u.foot;
    $("qrNote").textContent=u.qrNote;
    $("qrBtn").textContent=qrOpen?u.qrHide:u.qrShow;

    const items=[
      KART.telefon  && {t:u.call,     href:"tel:"+KART.telefon.replace(/\s/g,"")},
      KART.eposta   && {t:u.email,    href:"mailto:"+KART.eposta},
      KART.linkedin && {t:u.linkedin, href:KART.linkedin, ext:true},
    ].filter(Boolean);
    const act=$("actions"); act.innerHTML="";
    act.style.gridTemplateColumns=`repeat(${items.length},1fr)`;
    items.forEach(i=>{
      const a=document.createElement("a");
      a.className="mini";a.textContent=i.t;a.href=i.href;
      if(i.ext){a.target="_blank";a.rel="noopener";}
      act.appendChild(a);
    });
  }
  function setLang(l){
    lang=l;
    $("btnTr").classList.toggle("active",l==="tr");
    $("btnEn").classList.toggle("active",l==="en");
    render();
  }
  $("vcardBtn").addEventListener("click",()=>{
    const d=KART[lang];
    const [adi,...soy]=d.ad.trim().split(" ");
    const v=[
      "BEGIN:VCARD","VERSION:3.0",
      `N:${soy.join(" ")};${adi};;;`,
      `FN:${d.ad}`,
      `ORG:${d.kurum};${d.birim}`,
      `TITLE:${d.unvan}`,
      KART.telefon  && `TEL;TYPE=CELL:${KART.telefon}`,
      KART.eposta   && `EMAIL;TYPE=WORK:${KART.eposta}`,
      KART.linkedin && `URL:${KART.linkedin}`,
      `ADR;TYPE=WORK:;;;${d.sehir};;;`,
      "END:VCARD",
    ].filter(Boolean).join("\r\n");
    const url=URL.createObjectURL(new Blob([v],{type:"text/vcard"}));
    const a=document.createElement("a");
    a.href=url;a.download=d.ad.replace(/\s+/g,"_")+".vcf";
    document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url);
  });
  $("qrBtn").addEventListener("click",()=>{
    const w=$("qrwrap"); qrOpen=!qrOpen;
    w.classList.toggle("open",qrOpen);
    $("qrBtn").textContent=qrOpen?UI[lang].qrHide:UI[lang].qrShow;
    if(!qrDone && qrOpen){
      new QRCode($("qr"),{text:location.href,width:168,height:168,
        colorDark:"#3A3D42",colorLight:"#ffffff",correctLevel:QRCode.CorrectLevel.M});
      qrDone=true;
    }
  });
  render();
</script>
</body>
</html>
